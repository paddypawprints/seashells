name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build extension assets
        run: ./scripts/build-system.sh
        env:
          SKIP_MODEL_DOWNLOAD: "1"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seashells-build-artifacts
          path: |
            dist/seashells-extension.zip
            dist/seashells-extension
            wasm-core/pkg
            vendor/onnxruntime-web
